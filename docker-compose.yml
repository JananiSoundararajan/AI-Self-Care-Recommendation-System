version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: selfcare-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=sqlite:///./selfcare.db
      - CHROMA_PERSIST_DIR=./chroma_db
      - MODEL_PATH=./ml/mood_classifier.joblib
      - USE_MOCK_LLM=${USE_MOCK_LLM:-false}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app           # live-reload for development
      - selfcare_db:/app/data    # persist SQLite
      - chroma_data:/app/chroma_db
      - ml_models:/app/ml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selfcare-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  selfcare_db:
  chroma_data:
  ml_models:
